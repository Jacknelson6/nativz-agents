name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          npm install
          cd agent-runtime && npm install

      - name: TypeScript check (agent-runtime)
        run: cd agent-runtime && npx tsc --noEmit

      - name: TypeScript check (frontend)
        run: npm run build

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Smoke tests
        run: ./scripts/test-agents.sh
