name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: |
          npm install
          cd agent-runtime && npm install

      - name: TypeScript check (agent-runtime)
        run: cd agent-runtime && npx tsc --noEmit

      - name: TypeScript check (frontend)
        run: npx tsc --noEmit

      - name: Vite build
        run: npx vite build

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Tests
        run: cd agent-runtime && node --test tests/runtime.test.ts
